# ghorg configuration file
# Use `ghorg config --list` to see all current values
# Use `ghorg config <key> <value>` to set a value
# Use `ghorg config --migrate` to convert from the legacy GHORG_* format

# ── SCM Provider ──────────────────────────────────────────────────────
scm:
  # Which provider to clone from (github, gitlab, gitea, bitbucket, sourcehut)
  # default: github | flag: --scm, -s
  type: github

  # Base URL for self-hosted SCM instances
  # For http gitlab instances see gitlab.insecure
  # default: (empty, uses public API) | flag: --base-url
  # base-url:

# ── Core Settings ────────────────────────────────────────────────────
core:
  # Absolute path where ghorg creates clone directories
  # default: ~/ghorg | flag: --path, -p
  # path: /home/user/ghorg/

  # Override the output directory name (defaults to org/user name)
  # flag: --output-dir
  # output-dir:

  # Max concurrent clone operations
  # default: 25 | flag: --concurrency
  concurrency: 25

  # Color output (enabled, disabled)
  # default: disabled | flag: --color
  color: disabled

  # Only emit critical output
  # default: false | flag: --quiet
  quiet: false

  # Show what would be cloned without cloning
  # default: false | flag: --dry-run
  dry-run: false

  # Skip directory size calculation after cloning
  # default: false | flag: --no-dir-size
  no-dir-size: false

# ── Clone Behavior ───────────────────────────────────────────────────
clone:
  # Clone protocol (https or ssh)
  # default: https | flag: --protocol
  protocol: https

  # Clone target type (org or user)
  # default: org | flag: --clone-type, -c
  type: org

  # Branch to checkout after cloning
  # default: (repo default branch) | flag: --branch, -b
  # branch:

  # Shallow clone depth (empty for full clone)
  # flag: --clone-depth
  # depth:

  # Delay in seconds between clones (forces concurrency to 1 when > 0)
  # default: 0 | flag: --clone-delay-seconds
  delay-seconds: 0

  # Clone wiki repositories
  # default: false | flag: --clone-wiki
  wiki: false

  # Clone GitLab snippets
  # default: false | flag: --clone-snippets
  snippets: false

  # Mirror clone for backup purposes (ignores branch parameter)
  # default: false | flag: --backup
  backup: false

  # Skip git clean on existing repositories
  # default: false | flag: --no-clean
  no-clean: false

  # Initialize and update submodules
  # default: false | flag: --include-submodules
  include-submodules: false

  # Sync local default branch with remote on existing repos
  # Includes safety checks for uncommitted changes and unpushed commits
  # default: false | flag: --sync-default-branch
  sync-default-branch: false

  # Preserve GitLab namespace directory structure
  # default: false | flag: --preserve-dir
  preserve-dir: false

  # Append SCM hostname to clone path (e.g., ~/ghorg/github.com/org)
  # default: false | flag: --preserve-scm-hostname
  preserve-scm-hostname: false

  # Skip repos with uncommitted changes or unpushed commits
  # default: false | flag: --protect-local
  protect-local: false

# ── Authentication ───────────────────────────────────────────────────
auth:
  # Clone without authentication (SCM server must allow unauthenticated API calls)
  # default: false | flag: --no-token
  no-token: false

# ── Git Options ──────────────────────────────────────────────────────
git:
  # Git filter options (e.g., blob:none for partial clones)
  # Requires git >= 2.19, only applies to initial clones
  # Backend support: exec only — go-git ignores with a warning
  # flag: --git-filter
  # filter:

  # Comma-separated cone-mode sparse-checkout patterns (e.g., "docs,src/api").
  # Limits each clone's working tree to the matching paths. Combine with
  # filter and depth for very lean code-search clones.
  # Backend support: exec only — go-git ignores with a warning
  # flag: --sparse-checkout
  # sparse-checkout:

  # Git backend: golang (pure Go, default) or exec (system git)
  # Backend feature matrix:
  #   depth         — both backends
  #   submodules    — both backends
  #   mirror/backup — both backends
  #   filter        — exec only
  #   sparse-checkout — exec only
  # default: golang | flag: --git-backend
  backend: golang

  # Only attempt repos whose last recorded status was "error" (reads
  # _ghorg_state.json from the clone target directory). Composes with all
  # other filters. If no state file exists, falls back to cloning everything.
  # default: false | flag: --retry-failed
  # retry-failed: false

# ── Filtering ────────────────────────────────────────────────────────
filter:
  # Skip archived repositories (github/gitlab/gitea)
  # default: false | flag: --skip-archived
  skip-archived: false

  # Skip forked repositories (github/gitlab/gitea)
  # default: false | flag: --skip-forks
  skip-forks: false

  # Comma-separated topic filter (github/gitlab/gitea)
  # flag: --topics
  # topics:

  # Include repos matching prefix (comma-separated, case-insensitive)
  # flag: --match-prefix
  # match-prefix:

  # Exclude repos matching prefix (comma-separated, case-insensitive)
  # flag: --exclude-match-prefix
  # exclude-match-prefix:

  # Include repos matching regex pattern
  # flag: --match-regex
  # match-regex:

  # Exclude repos matching regex pattern
  # flag: --exclude-match-regex
  # exclude-match-regex:

  # Path to ghorgignore file
  # default: ~/.config/ghorg/ghorgignore | flag: --ghorgignore-path
  # ignore-path:

  # Path to ghorgonly file
  # default: ~/.config/ghorg/ghorgonly | flag: --ghorgonly-path
  # only-path:

  # Path to file listing specific repos to clone (one per line)
  # flag: --target-repos-path
  # target-repos-path:

# ── Pruning ──────────────────────────────────────────────────────────
prune:
  # Delete local repos not found on remote
  # default: false | flag: --prune
  enabled: false

  # Skip confirmation when pruning
  # default: false | flag: --prune-no-confirm
  no-confirm: false

  # Prune repos that were not cloned or updated
  # default: false | flag: --prune-untouched
  untouched: false

  # Skip confirmation for untouched repo pruning
  # default: false | flag: --prune-untouched-no-confirm
  untouched-no-confirm: false

# ── Fetch ────────────────────────────────────────────────────────────
fetch:
  # Fetch all remote branches
  # default: false | flag: --fetch-all
  all: false

  # Append --prune to fetch (requires fetch.all)
  # default: false | flag: --fetch-prune
  prune: false

# ── Exit Codes ───────────────────────────────────────────────────────
exit-code:
  # Exit code when info-level messages are present
  # default: 0 | flag: --exit-code-on-clone-infos
  clone-infos: 0

  # Exit code when clone errors occur
  # default: 1 | flag: --exit-code-on-clone-issues
  clone-issues: 1

# ── Stats ────────────────────────────────────────────────────────────
stats:
  # Generate a stats CSV after cloning (_ghorg_stats.csv)
  # default: false | flag: --stats-enabled
  enabled: false

# ── SSH ──────────────────────────────────────────────────────────────
ssh:
  # Custom SSH hostname alias (useful for ~/.ssh/config aliases)
  # flag: --ssh-hostname
  # hostname:

# ── GitHub ───────────────────────────────────────────────────────────
github:
  # GitHub personal access token (or path to file containing token)
  # flag: --token, -t
  # token:

  # Treat token as a GitHub App token
  # default: false | flag: --github-token-from-github-app
  token-from-app: false

  # Path to GitHub App PEM private key file
  # flag: --github-app-pem-path
  # app-pem-path:

  # GitHub App installation ID
  # flag: --github-app-installation-id
  # app-installation-id:

  # GitHub App application ID
  # flag: --github-app-id
  # app-id:

  # User repo filter: owner, member, or all (only with clone.type=user)
  # default: owner
  # user-option:

  # Filter repos by language (comma-separated)
  # flag: --github-filter-language
  # filter-language:

  # Clone user gists
  # default: false | flag: --github-user-gists
  user-gists: false

# ── GitLab ───────────────────────────────────────────────────────────
gitlab:
  # GitLab personal access token (or path to file containing token)
  # flag: --token, -t
  # token:

  # Skip TLS certificate verification
  # default: false | flag: --insecure-gitlab-client
  insecure: false

  # Exclude groups matching regex
  # flag: --gitlab-group-exclude-match-regex
  # group-exclude-match-regex:

  # Include only groups matching regex
  # flag: --gitlab-group-match-regex
  # group-match-regex:

# ── Bitbucket ────────────────────────────────────────────────────────
bitbucket:
  # Bitbucket OAuth/PAT token (do not set with app-password)
  # flag: --token, -t
  # oauth-token:

  # Bitbucket app password (do not set with oauth-token)
  # flag: --token, -t
  # app-password:

  # Bitbucket username (required with app-password)
  # flag: --bitbucket-username
  # username:

  # Bitbucket Cloud API token
  # flag: --bitbucket-api-token
  # api-token:

  # Email for Bitbucket API token auth
  # flag: --bitbucket-api-email
  # api-email:

  # Allow HTTP for Bitbucket Server
  # default: false | flag: --insecure-bitbucket-client
  insecure: false

# ── Gitea ────────────────────────────────────────────────────────────
gitea:
  # Gitea personal access token (Settings > Applications > Generate Token)
  # flag: --token, -t
  # token:

  # Allow HTTP for Gitea
  # default: false | flag: --insecure-gitea-client
  insecure: false

# ── Sourcehut ────────────────────────────────────────────────────────
sourcehut:
  # Sourcehut personal access token (requires REPOSITORIES and OBJECT permissions)
  # flag: --token, -t
  # token:

  # Allow HTTP for Sourcehut
  # default: false | flag: --insecure-sourcehut-client
  insecure: false

# ── Reclone ──────────────────────────────────────────────────────────
reclone:
  # Path to reclone.yaml configuration file
  # default: ~/.config/ghorg/reclone.yaml | flag: --reclone-path
  # path:

  # Suppress reclone output
  # default: false | flag: --quiet
  quiet: false

  # Use only environment variables for reclone config
  # default: false
  env-config-only: false

  # Port for the reclone HTTP server
  # default: :8080 | flag: --port
  server-port: ":8080"

  # Interval in minutes for cron-based recloning
  # default: 60 | flag: --minutes
  cron-timer-minutes: 60
