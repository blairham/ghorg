# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com
version: 2
project_name: ghorg
before:
  hooks:
    - go mod tidy
builds:
  - env:
      - CGO_ENABLED=0
    main: .
    ldflags:
      - -s -w -X github.com/blairham/ghorg/internal/cmd.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: darwin
        goarch: arm
archives:
  - id: ghorg
    name_template: >-
      {{- .ProjectName }}_ {{- .Version }}_ {{- title .Os }}_ {{- if eq .Arch "amd64" }}x86_64 {{- else if eq .Arch "386" }}i386 {{- else }}{{ .Arch }}{{ end }} {{- if .Arm }}v{{ .Arm }}{{ end -}}
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?.*$'
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))?.*$'
    - title: Performance
      regexp: '^.*?perf(\(.+\))?.*$'
    - title: Refactoring
      regexp: '^.*?refactor(\(.+\))?.*$'
    - title: CI/CD
      regexp: '^.*?ci(\(.+\))?.*$'
    - title: Other
      order: 999

dockers_v2:
  - images:
      - "ghcr.io/blairham/ghorg"
    tags:
      - "{{ .Tag }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
      - linux/arm/v7
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Quickly clone an entire org/users repositories into one directory"
      "org.opencontainers.image.url": "https://github.com/blairham/ghorg"
      "org.opencontainers.image.source": "https://github.com/blairham/ghorg"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"
    extra_files:
      - sample-conf.yaml
      - sample-reclone.yaml
